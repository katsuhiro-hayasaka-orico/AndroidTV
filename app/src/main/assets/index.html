<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Deep Sea Ambient Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="deepSeaLayer" class="deep-sea-layer" aria-hidden="true">
        <canvas id="deepSeaCanvas" class="deep-sea-canvas"></canvas>
        <div class="deep-sea-fallback"></div>
    </div>
    <div class="abyssal-viewport" aria-hidden="true">
        <div class="abyssal-beam"></div>
        <div class="abyssal-grid"></div>
        <div class="abyssal-vignette"></div>
    </div>
    <div class="abyssal-hud" aria-hidden="true">
        <div class="abyssal-hud__row">
            <span>ABYSSAL DRIFT</span>
            <span id="abyssalDate">----</span>
        </div>
        <div class="abyssal-hud__row abyssal-hud__row--muted">
            <span>— 深海 2,800m —</span>
            <span id="abyssalStatus">DRIFT --</span>
        </div>
        <div id="abyssalDepth" class="abyssal-depth">深度 ---- m</div>
    </div>
    <main id="display" class="display is-digital" data-font-preset="readable" aria-label="現在時刻と当月カレンダー">
        <section class="clock-panel" aria-label="現在時刻">
            <div class="clock-stage" aria-live="polite">
                <div id="time" class="time" data-clock-view="digital">--:--</div>

                <div id="analogClock" class="analog-clock" data-clock-view="analog" aria-label="アナログ時計" role="img">
                    <div class="analog-face" aria-hidden="true">
                        <span class="hour-mark mark-12"></span>
                        <span class="hour-mark mark-3"></span>
                        <span class="hour-mark mark-6"></span>
                        <span class="hour-mark mark-9"></span>
                        <span class="minute-ring"></span>
                        <span class="analog-brand" aria-hidden="true">IL</span>
                        <span class="hand hour-hand" id="hourHand"></span>
                        <span class="hand minute-hand" id="minuteHand"></span>
                        <span class="pin"></span>
                    </div>
                    <span id="analogLabel" class="sr-only">--時--分</span>
                </div>
            </div>

        </section>

        <aside class="calendar-panel" aria-label="当月カレンダー">
            <div id="monthTitle" class="month-title">----年 --月</div>
            <div class="calendar-weekdays" aria-hidden="true">
                <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
            </div>
            <div id="calendar" class="calendar-grid"></div>
        </aside>
    </main>
    <div class="innovation-credit" aria-hidden="true">Created by Innovation Lab</div>
    <div id="fontToast" class="font-toast" aria-hidden="true"></div>
    <div id="chimeToast" class="chime-toast" aria-hidden="true"></div>
    <audio id="chimeAudio" src="audio/chime.mp3" preload="auto"></audio>

    <script src="deep-sea.js"></script>
    <script src="abyssal-ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
